<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>latihan navbar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        h2{
            margin: 10px;
        }

        ul{
            padding: 0;
            margin: 0;
            list-style-type: none;
            overflow: hidden;
            background-color: #f1f1f1;
        }

        ul li{
            float: left;
        }

        ul li a {
            display: block;
            color: black;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;

        }

        /* li a{
            display: block;
            color: #000;
            padding: 8px 16px;
            text-decoration: none;
        } */

       ul li a:hover{
            background-color: #555;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Navbar</h1>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#about">About</a></li>
    </ul>
</body>
</html>
